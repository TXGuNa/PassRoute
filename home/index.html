    {ex:'dl',  ic:'🚗', acc:'var(--green)', tag:tr('dlTag'), name:tr('dlName'), desc:tr('dlDesc'), subs:['Road Signs','Rules of the Road','Safe Driving','Penalties']},
    {ex:'sat', ic:'🎓', acc:'#7c3aed', tag:(SAT_T[LANG]||SAT_T.en).tag, name:(SAT_T[LANG]||SAT_T.en).name, desc:(SAT_T[LANG]||SAT_T.en).desc, subs:['Math','Reading & Writing']},
    {ex:'civ', ic:'🛂', acc:'var(--teal)', tag:tr('civTag'), name:tr('civName'), desc:tr('civDesc'), subs:['Government','History','Symbols & Holidays']}
  ];
  document.getElementById('cards').innerHTML=defs.map(function(d){
    return '<div class="xcard" style="--accent:'+d.acc+'" onclick="pick(\''+d.ex+'\')">'+
      '<span class="top-accent"></span>'+
      '<div class="ic">'+d.ic+'</div>'+
      '<div class="tag">'+d.tag+'</div>'+
      '<h3>'+d.name+'</h3>'+
      '<p>'+d.desc+'</p>'+
      '<div class="subjects">'+d.subs.map(function(s){return '<span>'+s+'</span>';}).join('')+'</div>'+
      '<button class="cta" onclick="event.stopPropagation();pick(\''+d.ex+'\')">'+tr('start')+' →</button>'+
    '</div>';
  }).join('');
}
function applyI18n(){
  document.documentElement.setAttribute('lang',LANG);
  document.documentElement.setAttribute('dir', LANG==='ar'?'rtl':'ltr');
  document.getElementById('langCur').textContent=LANG.toUpperCase();
  document.getElementById('brandSub').textContent=tr('brandSub');
  document.getElementById('eyebrow').textContent=tr('eyebrow');
  document.getElementById('heroTitle').textContent=tr('heroTitle');
  document.getElementById('heroSub').textContent=tr('heroSub');
  document.getElementById('stateLbl').textContent=tr('stateLbl');
  document.getElementById('stateHint').textContent=tr('stateHint');
  document.getElementById('footNote').textContent=tr('footNote');
  var _qsfx=(LANG==='en'?'':'.'+LANG), _ql={en:'Free practice questions',es:'Preguntas de práctica gratis',ru:'Бесплатные вопросы для практики',tr:'Ücretsiz deneme soruları',hi:'मुफ्त अभ्यास प्रश्न',ar:'أسئلة تدريب مجانية'};
  document.getElementById('siteFoot').innerHTML=tr('foot')+'<div style="margin-top:8px"><a href="../index.html">CDL</a> · <a href="../dl/index.html">DL</a> · <a href="../citizenship/index.html">Citizenship</a> · <a href="../sat/index.html">SAT</a> · <a href="../privacy.html">Privacy</a> · <a href="../terms.html">Terms</a></div>'+
    '<div style="margin-top:6px"><b>'+(_ql[LANG]||_ql.en)+':</b> <a href="../cdl-practice-questions'+_qsfx+'.html">CDL</a> · <a href="../dl-practice-questions'+_qsfx+'.html">DL</a> · <a href="../citizenship-practice-questions'+_qsfx+'.html">Citizenship</a> · <a href="../sat-practice-questions'+_qsfx+'.html">SAT</a></div>';
  renderCards();
}
/* language menu */
function renderLangMenu(){ var names={en:'English',es:'Español',ru:'Русский',tr:'Türkçe',hi:'हिन्दी',ar:'العربية'};
  document.getElementById('langMenu').innerHTML=Object.keys(names).filter(function(l){return l!==LANG;}).map(function(l){ return '<button role="option" onclick="setLang(\''+l+'\')">'+names[l]+'</button>'; }).join(''); }
function toggleLang(e){ if(e) e.stopPropagation(); document.getElementById('langdd').classList.toggle('open'); }
document.addEventListener('click',function(){ var d=document.getElementById('langdd'); if(d) d.classList.remove('open'); });
function setLang(l){ if(!T[l]) return; LANG=l; try{ localStorage.setItem('pr_civ_lang',l); localStorage.setItem('tx_cdl_lang',l); }catch(e){} renderLangMenu(); applyI18n(); }
/* theme */
function toggleTheme(){ var d=document.documentElement.getAttribute('data-theme')==='dark'?'':'dark'; document.documentElement.setAttribute('data-theme',d); try{ localStorage.setItem('tx_cdl_theme',d); }catch(e){} document.getElementById('themeBtn').textContent=d==='dark'?'☀️':'🌙'; }
/* boot */
(function(){ try{ var th=localStorage.getItem('tx_cdl_theme'); if(th==='dark') document.documentElement.setAttribute('data-theme','dark'); }catch(e){}
  document.getElementById('themeBtn').textContent=(document.documentElement.getAttribute('data-theme')==='dark')?'☀️':'🌙';
  fillStates(); renderLangMenu(); applyI18n();
})();
</script>
