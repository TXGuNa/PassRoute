};
var PKEY="tx_dl_progress", TKEY="tx_dl_theme", LKEY="tx_dl_lang", HKEY="tx_dl_history", SKEY="tx_dl_session";
var LANG=(function(){ try{ var u=new URLSearchParams(location.search).get('lang'); if(u&&UI[u]){localStorage.setItem(LKEY,u);return u;} return localStorage.getItem(LKEY)||'en'; }catch(e){ return 'en'; } })();
function t(k,v){ var s=(UI[LANG]&&UI[LANG][k]!=null)?UI[LANG][k]:(UI.en[k]!=null?UI.en[k]:k); if(v) for(var x in v) s=String(s).split('{'+x+'}').join(v[x]); return stz(s); }
function catName(c){ if(c.kind==='learn'&&c.learnSubject){ var b=DATA.categories.find(function(x){return x.id===c.learnSubject;}); if(b) c=b; } var o=I18N.cat[LANG]&&I18N.cat[LANG][c.id]; return (o&&o.name)||c.name; }
function baseCatId(c){ var cat=(typeof c==='string')?DATA.categories.find(function(x){return x.id===c;}):c; return (cat&&cat.kind==='learn'&&cat.learnSubject)?cat.learnSubject:(cat?cat.id:c); }

function qData(catId,qid){ var en=DATA.categories.find(function(c){return c.id===catId;}).questions[qid];
  var tr=I18N.q[LANG]&&I18N.q[LANG][catId]&&I18N.q[LANG][catId][qid]; var s=(LANG!=='en'&&tr)?tr:en;
  return { q:s.q||en.q, options:s.options||en.options, explanation:s.explanation||en.explanation, handbook:en.handbook, hbref:en.hbref, translated:!!(LANG!=='en'&&tr) }; }

/* ---------- auto-scale tests ---------- */
DATA.categories.forEach(function(c){ var P=c.questions.length;
  if(c.kind==='learn'){ c.examSize=P; c.numTests=1; c.passNeed=Math.max(1,Math.round(P*0.8)); }
  else { var E=Math.min(20,P); c.examSize=E; c.numTests=Math.max(1,Math.ceil(P/E)); c.passNeed=Math.max(1,Math.round(E*0.8)); } });

/* ---------- progress ---------- */
function loadProg(){ try{ return JSON.parse(localStorage.getItem(PKEY))||{}; }catch(e){ return {}; } }
function saveProg(p){ try{ localStorage.setItem(PKEY,JSON.stringify(p)); }catch(e){} }
function getResult(cat,idx){ var p=loadProg(); return p[cat+'|'+idx]||null; }
function recordResult(cat,idx,correct,total){ var p=loadProg(),k=cat+'|'+idx,r=p[k]||{attempts:0,bestPct:0,bestCorrect:0,passed:false},pct=Math.round(correct/total*100);
  r.attempts++; if(pct>=r.bestPct){r.bestPct=pct;r.bestCorrect=correct;} r.total=total; if(correct>=passMark(total)) r.passed=true; p[k]=r; saveProg(p); }
function passMark(len){ return Math.max(1,Math.round(len*0.8)); }
function loadHist(){ try{ return JSON.parse(localStorage.getItem(HKEY))||[]; }catch(e){ return []; } }
function pushHist(r){ var h=loadHist(); h.push(r); if(h.length>200) h.splice(0,h.length-200); try{ localStorage.setItem(HKEY,JSON.stringify(h)); }catch(e){} }
function catStats(c){ var passed=0; for(var i=0;i<c.numTests;i++){ var r=getResult(c.id,i); if(r&&r.passed) passed++; } return {passed:passed,total:c.numTests}; }

/* ---------- session cache (refresh resume) ---------- */
function saveSession(){ try{ if(state&&(state.view==='test'||state.view==='results')&&state.test){
  sessionStorage.setItem(SKEY,JSON.stringify({view:state.view,catId:state.catId,idx:state.idx,cur:state.cur,answers:state.answers,correct:state.correct,incorrect:state.incorrect,startTime:state.startTime,elapsed:state.elapsed,test:state.test})); }
  else sessionStorage.removeItem(SKEY); }catch(e){} }
function clearSession(){ try{ sessionStorage.removeItem(SKEY); }catch(e){} }
function restoreSession(){ try{ var raw=sessionStorage.getItem(SKEY); if(!raw) return false; var s=JSON.parse(raw);
  var cat=DATA.categories.find(function(c){return c.id===s.catId;}); if(!cat||!Array.isArray(s.test)||(s.view!=='test'&&s.view!=='results')){clearSession();return false;}
  state={view:s.view,catId:s.catId,idx:s.idx,cat:cat,test:s.test,cur:s.cur||0,answers:s.answers||[],correct:s.correct||0,incorrect:s.incorrect||0,startTime:s.startTime||Date.now(),elapsed:s.elapsed};
  window.scrollTo(0,0); render(); if(state.view==='test') startTimer(); return true;
}catch(e){ clearSession(); return false; } }

/* ---------- timer ---------- */
var timerInt=null;
function fmtTime(ms){ var s=Math.max(0,Math.floor(ms/1000)),m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,'0'); }
function tick(){ var el=document.getElementById('qtimer'); if(el&&state.startTime) el.textContent=fmtTime(Date.now()-state.startTime); }
function startTimer(){ stopTimer(); timerInt=setInterval(tick,1000); tick(); }
function stopTimer(){ if(timerInt){clearInterval(timerInt);timerInt=null;} }

/* ---------- TTS ---------- */
function langBCP(){ return LANG==='tr'?'tr-TR':LANG==='ru'?'ru-RU':LANG==='es'?'es-MX':LANG==='hi'?'hi-IN':'en-US'; }
function stopSpeak(){ try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){} }
function speak(e){ if(e) e.stopPropagation(); if(!('speechSynthesis' in window)) return; var it=state.test&&state.test[state.cur]; if(!it) return;
  if(speechSynthesis.speaking){ stopSpeak(); return; } var qd=qData(state.catId,it.qid);
  var opts=it.optOrder.map(function(oi,i){ return String.fromCharCode(65+i)+'. '+qd.options[oi]; });
  var u=new SpeechSynthesisUtterance(qd.q+'. '+opts.join('. ')); u.lang=qd.translated?langBCP():'en-US'; u.rate=.95; stopSpeak(); speechSynthesis.speak(u); }

/* ---------- router ---------- */
var state={};
function go(view,opts){ stopTimer(); stopSpeak(); state=Object.assign({view:view},opts||{}); window.scrollTo(0,0); render(); syncURL(); saveSession(); }
function urlFor(){ var p=new URLSearchParams(); if(state.view&&state.view!=='home') p.set('v',state.view); if(state.catId) p.set('cat',state.catId); if(typeof state.idx==='number') p.set('n',state.idx+1); if(LANG!=='en') p.set('lang',LANG); var q=p.toString(); return location.pathname+(q?'?'+q:''); }
function syncURL(){ try{ history.pushState({view:state.view,catId:state.catId||null},'',urlFor()); }catch(e){} }
window.addEventListener('popstate',function(ev){ var st=ev.state||{}; if(st.view==='category'&&st.catId){ state={view:'category',catId:st.catId}; render(); } else if(st.view==='stats'){ state={view:'stats'}; render(); } else { state={view:'home'}; render(); } });
function initRoute(){ try{ var p=new URLSearchParams(location.search),v=p.get('v'),cat=p.get('cat');
  if(v==='category'&&cat&&DATA.categories.some(function(c){return c.id===cat;})) state={view:'category',catId:cat};
  else if(v==='stats') state={view:'stats'}; else state={view:'home'}; }catch(e){ state={view:'home'}; }
  window.scrollTo(0,0); render(); }
function render(){ var el=document.getElementById('app');
  if(state.view==='home') el.innerHTML=renderHome();

function mountAds(){ try{ var ins=document.querySelectorAll('ins.adsbygoogle:not([data-adsbygoogle-status])'); for(var i=0;i<ins.length;i++)(window.adsbygoogle=window.adsbygoogle||[]).push({}); }catch(e){} }

function tiles(cat){ var html='',isL=cat.kind==='learn';
  for(var i=0;i<cat.numTests;i++){ var r=getResult(cat.id,i), badge='<span class="badge b-new">'+t('notStarted')+'</span>', best='';

    html+='<div class="tcard'+(isL?' learn':'')+'" onclick="startTest(\''+cat.id+'\','+i+')"><div class="num">'+(isL?t('learnTile'):t('practiceTile'))+'</div><div class="ttl">'+(isL?t('lessonN',{n:i+1}):t('testN',{n:i+1}))+'</div>'+badge+best+'</div>'; }

function renderCategory(catId){ var cat=DATA.categories.find(function(c){return c.id===catId;}); var lc=learnCatFor(catId);

/* ---------- test engine ---------- */
function rs(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var x=a[i];a[i]=a[j];a[j]=x; } return a; }
function buildTest(cat,idx){ var P=cat.questions.length,E=Math.min(cat.examSize,P),order=[];
  for(var i=0;i<P;i++) order.push(i); order=rs(order).slice(idx*E,idx*E+E); if(order.length<E){ var extra=rs(Array.from({length:P},function(_,k){return k;})); order=order.concat(extra).slice(0,E); }
  order.sort(function(a,b){return a-b;});
  return order.map(function(qi){ var q=cat.questions[qi]; var idxs=q.options.map(function(_,i){return i;});
    var pin=idxs.filter(function(i){return /^(all|none)\b/i.test(String(q.options[i]).trim());}); var free=idxs.filter(function(i){return pin.indexOf(i)<0;});
    var optOrder=rs(free).concat(pin); return {qid:qi,optOrder:optOrder,answer:optOrder.indexOf(q.answer)}; }); }
function startTest(catId,idx){ var cat=DATA.categories.find(function(c){return c.id===catId;}); var test=buildTest(cat,idx);
  state={view:'test',catId:catId,idx:idx,cat:cat,test:test,cur:0,answers:new Array(test.length).fill(null),correct:0,incorrect:0,startTime:Date.now()};
  window.scrollTo(0,0); renderTestShell(); startTimer(); syncURL(); saveSession(); }
function testLabel(c,idx){ return c.kind==='learn'?t('lessonN',{n:idx+1}):t('testN',{n:idx+1}); }
function renderTestShell(){ document.getElementById('app').innerHTML='<div class="crumb"><a onclick="go(\'home\')">'+t('home')+'</a> › <a onclick="go(\'category\',{catId:\''+baseCatId(state.cat)+'\'})">'+catName(state.cat)+'</a> › <span>'+testLabel(state.cat,state.idx)+'</span></div><div id="runner"></div>'; paintQuestion(); }
function paintQuestion(){ var s=state,it=s.test[s.cur],qd=qData(s.catId,it.qid),isL=s.cat.kind==='learn';
  var disp=it.optOrder.map(function(oi){return qd.options[oi];}); var prev=s.answers[s.cur],ans=prev!==null;
  var opts=disp.map(function(txt,i){ var cls='opt'; if(ans){ if(i===it.answer) cls+=' correct'; else if(i===prev) cls+=' wrong'; }
    var mark=''; if(ans&&i===it.answer) mark='<span class="mark" style="color:var(--green)">✓</span>'; else if(ans&&i===prev) mark='<span class="mark" style="color:var(--red)">✗</span>';
    return '<button class="'+cls+'" '+(ans?'disabled':'')+' onclick="choose('+i+')"><span class="key">'+String.fromCharCode(65+i)+'</span><span>'+txt+'</span>'+mark+'</button>'; }).join('');
  var explain=''; if(ans){ var good=prev===it.answer,L=String.fromCharCode(65+it.answer);
    explain='<div class="explain show '+(good?'good':'bad')+'"><div class="verdict">'+(good?t('correctV',{L:L}):t('wrongV',{L:L}))+'</div><p>'+qd.explanation+'</p>'+
      ((qd.handbook||qd.explanation)?'<div class="hb"><span class="src">'+t('src',{ref:qd.hbref})+'</span> “'+(qd.handbook||qd.explanation)+'”</div>':'')+'</div>'; }
  var last=s.cur===s.test.length-1, pct=Math.round(s.cur/s.test.length*100);
  document.getElementById('runner').innerHTML=
    '<div class="runbar"><span class="qpos">'+t('question')+' '+(s.cur+1)+' <span style="color:var(--muted)">/ '+s.test.length+'</span></span>'+
    '<div class="tally"><span class="chip" id="qtimer">0:00</span><span class="chip ok">✓ '+s.correct+'</span><span class="chip no">✗ '+s.incorrect+'</span></div></div>'+
    '<div class="pbar"><i style="width:'+pct+'%"></i></div>'+
    '<div class="qbody"><div class="qtext"><span>'+qd.q+langBadge(qd.translated)+'</span><button class="spk" onclick="speak(event)" title="'+t('speak')+'">🔊</button></div>'+
    '<div class="opts-l">'+opts+'</div>'+explain+
    '<div class="runftr"><button class="btn ghost" onclick="confirmQuit()">'+t('quit')+'</button>'+
    (ans?'<button class="btn primary" onclick="next()">'+(last?t('seeRes'):t('next'))+'</button>':'<span style="color:var(--muted);align-self:center">'+t('pick')+'</span>')+'</div></div>';
  tick(); }
function choose(i){ var s=state; if(s.answers[s.cur]!==null) return; s.answers[s.cur]=i; if(i===s.test[s.cur].answer) s.correct++; else s.incorrect++; paintQuestion(); saveSession(); var ex=document.querySelector('.explain'); if(ex) ex.scrollIntoView({behavior:'smooth',block:'nearest'}); }
function next(){ stopSpeak(); var s=state; if(s.cur<s.test.length-1){ s.cur++; paintQuestion(); saveSession(); window.scrollTo({top:0,behavior:'smooth'}); } else finishTest(); }
function confirmQuit(){ if(confirm(t('confirmQuit'))) go('category',{catId:baseCatId(state.cat)}); }
function finishTest(){ state.elapsed=Date.now()-(state.startTime||Date.now()); stopTimer(); recordResult(state.catId,state.idx,state.correct,state.test.length);
  pushHist({ts:Date.now(),cat:state.catId,idx:state.idx,correct:state.correct,total:state.test.length,passed:state.correct>=passMark(state.test.length)});
  state.view='results'; window.scrollTo(0,0); render(); syncURL(); saveSession(); }
function renderResults(){ var s=state,c=s.correct,tot=s.test.length,need=passMark(tot),pass=c>=need;
  var rev=s.test.map(function(it,i){ var qd=qData(s.catId,it.qid), ua=s.answers[i],good=ua===it.answer;
    return '<div style="background:var(--card);border:1px solid var(--line);border-left:4px solid '+(good?'var(--green)':'var(--red)')+';border-radius:11px;padding:11px 13px;margin:9px 0"><div style="font-weight:650">'+(i+1)+'. '+qd.q+'</div><div style="font-size:.86rem;margin-top:5px;color:var(--muted)">'+t('why')+': '+qd.explanation+'</div></div>'; }).join('');
  return '<div class="crumb"><a onclick="go(\'home\')">'+t('home')+'</a> › <a onclick="go(\'category\',{catId:\''+baseCatId(s.cat)+'\'})">'+catName(s.cat)+'</a> › <span>'+testLabel(s.cat,s.idx)+'</span></div>'+
    '<div class="res-hero"><div class="badge '+(pass?'b-pass':'b-fail')+'">'+(pass?t('resPass'):t('resFail'))+'</div>'+
    '<div class="res-score '+(pass?'res-pass':'res-fail')+'">'+c+' / '+tot+'</div><div style="color:var(--muted)">'+t('scoreLine',{c:c,t:tot,need:need})+'</div>'+
    '<div class="rrow"><button class="btn primary" onclick="startTest(\''+s.catId+'\','+s.idx+')">'+t('retake')+'</button>'+
    '<button class="btn ghost" onclick="go(\'category\',{catId:\''+baseCatId(s.cat)+'\'})">'+t('backTo',{cat:catName(s.cat)})+'</button></div></div>'+AD+
    '<h3 style="margin-top:22px">'+t('seeRes')+'</h3>'+rev; }
function renderStats(){ var h=loadHist(); if(!h.length) return '<div class="crumb"><a onclick="go(\'home\')">'+t('home')+'</a> › <span>'+t('statsT')+'</span></div><p style="color:var(--muted)">'+t('noData')+'</p>';

    return '<div style="display:flex;justify-content:space-between;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin:6px 0;background:var(--card)"><span>'+(c?catName(c):r.cat)+' · '+(c?testLabel(c,r.idx):t('testN',{n:r.idx+1}))+'</span><span class="badge '+(r.passed?'b-pass':'b-fail')+'">'+r.correct+'/'+r.total+'</span></div>'; }).join('');
  return '<div class="crumb"><a onclick="go(\'home\')">'+t('home')+'</a> › <span>'+t('statsT')+'</span></div><h2>'+t('statsT')+'</h2>'+
    '<div class="meta" style="margin:10px 0 16px"><span class="pill">'+t('taken')+': '+h.length+'</span><span class="pill">'+t('passed')+': '+passed+'</span></div>'+rows; }

function toggleTheme(){ var d=document.documentElement.getAttribute('data-theme')==='dark'?'':'dark'; document.documentElement.setAttribute('data-theme',d); try{ localStorage.setItem(TKEY,d); }catch(e){} document.getElementById('themeBtn').textContent=d==='dark'?'☀️':'🌙'; }
function resetAll(){ if(confirm(t('confirmReset'))){ try{ localStorage.removeItem(PKEY); localStorage.removeItem(HKEY); }catch(e){} clearSession(); go('home'); } }
function applyChrome(){ document.getElementById('brandSub').textContent=t('sub');
  document.getElementById('siteFooter').innerHTML=t('footMain')+'<br>'+t('footSub')+'<div style="margin-top:8px"><a href="'+HANDBOOK+'" target="_blank" rel="noopener">'+t('footHb')+'</a> · <a href="../cdl/index.html">CDL</a> · <a href="../privacy.html">Privacy</a> · <a href="../terms.html">Terms</a></div>'; }

/* ---------- boot ---------- */
(function(){ try{ var th=localStorage.getItem(TKEY); if(th==='dark'){ document.documentElement.setAttribute('data-theme','dark'); } }catch(e){}
  document.documentElement.setAttribute('lang',LANG);
  var tb=document.getElementById('themeBtn'); if(tb) tb.textContent=(document.documentElement.getAttribute('data-theme')==='dark')?'☀️':'🌙';
  renderLangMenu(); renderStateMenu(); applyChrome();
  if(!restoreSession()) initRoute(); })();
</script>
</body>
</html>
